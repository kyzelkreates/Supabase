<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Vault OS — Control Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a12;
      --surface:   #10101e;
      --surface2:  #16162a;
      --border:    #252540;
      --accent:    #7c3aed;
      --accent-lt: #a78bfa;
      --accent-dim:#2d1b69;
      --text:      #e2e2f0;
      --text-muted:#6b6b8f;
      --ok:        #22c55e;
      --warn:      #f59e0b;
      --fail:      #ef4444;
      --nav-w:     220px;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    #topbar {
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: 1rem;
      flex-shrink: 0;
      z-index: 10;
    }
    #topbar .logo { color: var(--accent-lt); font-weight: 700; font-size: 0.95rem; letter-spacing: 0.05em; }
    #topbar .version { color: var(--text-muted); font-size: 0.75rem; }
    #gate-pill {
      margin-left: auto;
      padding: 0.2rem 0.75rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #gate-pill:hover { opacity: 0.8; }
    #gate-pill.open   { background: #14532d; color: var(--ok); }
    #gate-pill.warn   { background: #451a03; color: var(--warn); }
    #gate-pill.closed { background: #450a0a; color: var(--fail); }

    /* ── Layout ── */
    #layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--nav-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 1rem 0;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 1.25rem;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.875rem;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--accent-lt); border-left-color: var(--accent-lt); background: var(--accent-dim); }
    .nav-item .icon { font-size: 1rem; width: 1.1rem; text-align: center; }
    .nav-divider { height: 1px; background: var(--border); margin: 0.5rem 1rem; }

    /* ── Main panel ── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 1.75rem 2rem;
    }

    /* ── Panel base styles ── */
    .panel-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent-lt);
      margin-bottom: 1.25rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .card h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.ok      { background: #14532d; color: var(--ok); }
    .badge.warn    { background: #451a03; color: var(--warn); }
    .badge.fail    { background: #450a0a; color: var(--fail); }
    .badge.unknown { background: #1c1c2e; color: var(--text-muted); }
    .badge.idle    { background: #1c1c2e; color: var(--text-muted); }
    .badge.installed { background: #14532d; color: var(--ok); }
    .badge.pending   { background: #1e1b4b; color: var(--accent-lt); }

    /* ── Buttons ── */
    .btn {
      padding: 0.55rem 1.2rem;
      border-radius: 7px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #6d28d9; }
    .btn-secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent-lt); }
    .btn-secondary:hover:not(:disabled) { background: var(--accent-dim); }
    .btn-danger   { background: transparent; border: 1px solid var(--fail); color: var(--fail); }
    .btn-danger:hover:not(:disabled) { background: #450a0a; }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.78rem; }

    /* ── Forms ── */
    .form-group { margin-bottom: 0.85rem; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; }
    input[type="text"], input[type="password"], textarea, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent-lt); }
    textarea { resize: vertical; min-height: 100px; font-family: monospace; }

    /* ── Tables ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th { text-align: left; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    .data-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface2); }

    /* ── Log output ── */
    .log-output {
      background: #060610;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #9ca3af;
      max-height: 380px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-output .log-ok   { color: var(--ok); }
    .log-output .log-warn { color: var(--warn); }
    .log-output .log-err  { color: var(--fail); }
    .log-output .log-info { color: var(--accent-lt); }

    /* ── AI output ── */
    #ai-output {
      background: #060610;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      color: #c4b5fd;
      min-height: 120px;
      max-height: 420px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* ── Progress / spinner ── */
    .spinner {
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 999;
    }
    #toast.show-ok   { background: #14532d; color: var(--ok);   opacity: 1; }
    #toast.show-err  { background: #450a0a; color: var(--fail); opacity: 1; }
    #toast.show-info { background: #1e1b4b; color: var(--accent-lt); opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      :root { --nav-w: 48px; }
      .nav-item span:not(.icon) { display: none; }
      #main { padding: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header id="topbar">
    <span class="logo">⚡ AI VAULT OS</span>
    <span class="version">RUN 5</span>
    <span id="gate-pill" class="closed" title="Click to run health check" onclick="window.__dash?.openSystem()">
      ⟳ Checking…
    </span>
  </header>

  <!-- Layout -->
  <div id="layout">

    <!-- Sidebar nav -->
    <nav id="sidebar">
      <button class="nav-item active" data-panel="projects" onclick="window.__dash?.nav('projects', this)">
        <span class="icon">📁</span><span>Projects</span>
      </button>
      <button class="nav-item" data-panel="ai" onclick="window.__dash?.nav('ai', this)">
        <span class="icon">🧠</span><span>AI Panel</span>
      </button>
      <button class="nav-item" data-panel="install" onclick="window.__dash?.nav('install', this)">
        <span class="icon">⚙️</span><span>Install</span>
      </button>
      <div class="nav-divider"></div>
      <button class="nav-item" data-panel="logs" onclick="window.__dash?.nav('logs', this)">
        <span class="icon">📜</span><span>Logs</span>
      </button>
      <button class="nav-item" data-panel="system" onclick="window.__dash?.nav('system', this)">
        <span class="icon">🔬</span><span>System</span>
      </button>
      <button class="nav-item" data-panel="settings" onclick="window.__dash?.nav('settings', this)">
        <span class="icon">🔐</span><span>Settings</span>
      </button>
    </nav>

    <!-- Main content -->
    <main id="main">
      <div id="panel-root">
        <!-- Panels injected here by dashboard.js -->
      </div>
    </main>

  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Boot -->
  <script type="module" src="dashboard.js"></script>

</body>
</html>
