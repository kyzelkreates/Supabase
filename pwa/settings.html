<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Provider Vault — RUN 1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
      max-width: 680px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; color: #a78bfa; margin-bottom: 0.25rem; }
    .subtitle { color: #555; font-size: 0.82rem; margin-bottom: 2rem; }

    .section {
      background: #111122;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .section h2 {
      font-size: 0.95rem;
      color: #c4b5fd;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Key inputs */
    .key-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .key-row label {
      width: 130px;
      font-size: 0.85rem;
      color: #888;
      flex-shrink: 0;
    }
    .key-row input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: #e0e0e0;
      font-size: 0.85rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    .key-row input:focus { border-color: #a78bfa; }
    .key-row input::placeholder { color: #444; }
    .key-row .toggle-btn {
      background: transparent;
      border: 1px solid #333;
      border-radius: 6px;
      color: #888;
      padding: 0.45rem 0.6rem;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .key-row .toggle-btn:hover { border-color: #a78bfa; color: #a78bfa; }

    /* Provider status table */
    .provider-grid {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 0.5rem 1rem;
      font-size: 0.85rem;
      align-items: center;
    }
    .provider-grid .header {
      color: #555;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid #222;
    }
    .provider-name { color: #c4b5fd; font-weight: 600; }
    .badge {
      display: inline-block;
      border-radius: 4px;
      padding: 0.15rem 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge.enabled  { background: #14532d; color: #4ade80; }
    .badge.disabled { background: #1c1c1c; color: #555; }
    .badge.ok       { background: #14532d; color: #4ade80; }
    .badge.fail     { background: #450a0a; color: #f87171; }
    .badge.no_key   { background: #2a1f00; color: #fbbf24; }
    .badge.error    { background: #450a0a; color: #f87171; }
    .badge.pending  { background: #1a1a2e; color: #818cf8; }
    .badge.unknown  { background: #1c1c1c; color: #555; }

    .test-btn {
      background: transparent;
      border: 1px solid #a78bfa55;
      color: #a78bfa;
      border-radius: 6px;
      padding: 0.25rem 0.7rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .test-btn:hover { background: #a78bfa22; }

    /* Action buttons */
    .btn-row { display: flex; gap: 0.75rem; margin-top: 0.25rem; }
    .btn {
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #a78bfa; color: #0f0f0f; }
    .btn-primary:hover { background: #c4b5fd; }
    .btn-secondary { background: transparent; border: 1px solid #a78bfa; color: #a78bfa; }
    .btn-secondary:hover { background: #a78bfa22; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #14532d;
      color: #4ade80;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    .back-link {
      display: inline-block;
      color: #555;
      font-size: 0.82rem;
      text-decoration: none;
      margin-top: 1rem;
    }
    .back-link:hover { color: #a78bfa; }
  </style>
</head>
<body>

  <h1>⚡ AI Provider Vault</h1>
  <p class="subtitle">RUN 1 — Key vault + provider registry. Routing added in RUN 4.</p>

  <!-- API Key Entry -->
  <div class="section">
    <h2>🔐 API Keys</h2>

    <div class="key-row">
      <label>Groq</label>
      <input id="key-groq" type="password" placeholder="gsk_..." />
      <button class="toggle-btn" onclick="toggleVisibility('key-groq', this)">👁</button>
    </div>
    <div class="key-row">
      <label>OpenRouter</label>
      <input id="key-openrouter" type="password" placeholder="sk-or-..." />
      <button class="toggle-btn" onclick="toggleVisibility('key-openrouter', this)">👁</button>
    </div>
    <div class="key-row">
      <label>DeepSeek</label>
      <input id="key-deepseek" type="password" placeholder="sk-..." />
      <button class="toggle-btn" onclick="toggleVisibility('key-deepseek', this)">👁</button>
    </div>
    <div class="key-row">
      <label>Together AI</label>
      <input id="key-together" type="password" placeholder="..." />
      <button class="toggle-btn" onclick="toggleVisibility('key-together', this)">👁</button>
    </div>
    <div class="key-row">
      <label>HuggingFace</label>
      <input id="key-huggingface" type="password" placeholder="hf_..." />
      <button class="toggle-btn" onclick="toggleVisibility('key-huggingface', this)">👁</button>
    </div>

    <div class="btn-row" style="margin-top: 1rem;">
      <button class="btn btn-primary" id="save-btn" onclick="saveKeys()">💾 Save to Vault</button>
    </div>
  </div>

  <!-- Provider Status -->
  <div class="section">
    <h2>📡 Provider Status</h2>
    <div class="provider-grid" id="provider-grid">
      <div class="header">Provider</div>
      <div class="header">Status</div>
      <div class="header">Health</div>
      <div class="header">Test</div>
      <!-- rows injected by settings.js -->
    </div>
    <div class="btn-row" style="margin-top: 1rem;">
      <button class="btn btn-secondary" onclick="testAll()">🧪 Test All Providers</button>
    </div>
  </div>

  <!-- Run Info -->
  <div class="section">
    <h2>📊 Run State</h2>
    <p id="run-status-text" style="font-size:0.85rem; color:#666;">Loading...</p>
  </div>

  <a class="back-link" href="index.html">← Back to home</a>

  <div id="toast">✅ Keys saved to vault</div>

  <script src="settings.js" type="module"></script>
</body>
</html>
