<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a12" />
  <title>AI Vault OS</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a12;
      color: #e2e2f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.25rem;
    }
    .logo    { font-size: 2rem; color: #a78bfa; font-weight: 800; letter-spacing: 0.04em; }
    .sub     { color: #555; font-size: 0.85rem; }
    .badge   { background: #1a1a2e; border: 1px solid #a78bfa44; border-radius: 8px; padding: 0.45rem 1.1rem; font-size: 0.82rem; color: #a78bfa; }
    #msg     { color: #6b6b8f; font-size: 0.85rem; min-height: 1.2em; }
    .spinner { display: inline-block; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-row { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
    .btn {
      padding: 0.65rem 1.75rem; border-radius: 8px; border: none;
      font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary   { background: #7c3aed; color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-secondary { background: transparent; border: 1px solid #7c3aed; color: #a78bfa; }
    .btn-secondary:hover { background: #2d1b69; }
  </style>
</head>
<body>

  <div class="logo">⚡ AI Vault OS</div>
  <div class="sub">Self-installing AI backend compiler</div>
  <div class="badge" id="run-badge">RUN 0 — INITIALIZING</div>
  <div id="msg"><span class="spinner">⟳</span> Loading vault…</div>

  <div class="btn-row" id="btn-row" style="display:none">
    <button class="btn btn-primary"   onclick="window.location.href='dashboard.html'">🚀 Open Dashboard</button>
    <button class="btn btn-secondary" onclick="window.location.href='settings.html'">⚙️ Settings</button>
  </div>

  <script type="module">
    import { openDB }              from "./vault.js";
    import { saveRecord, getRecord } from "./db.js";

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }

    async function boot() {
      const msg    = document.getElementById("msg");
      const badge  = document.getElementById("run-badge");
      const btnRow = document.getElementById("btn-row");

      try {
        await openDB();

        const existing = await getRecord("settings", "system");
        if (!existing) {
          await saveRecord("settings", { id: "system", theme: "dark", aiEnabled: false, activeRun: 0 });
        }

        badge.textContent = "RUN 0 — INITIALIZED";
        msg.textContent   = "✅ Vault ready — redirecting to dashboard…";
        btnRow.style.display = "flex";

        // Auto-redirect to dashboard after a short moment
        setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);

      } catch (err) {
        badge.textContent = "RUN 0 — ERROR";
        msg.textContent   = "❌ Vault init failed: " + err.message;
        btnRow.style.display = "flex";
      }
    }

    boot();
  </script>

</body>
</html>
