<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a12" />
  <title>AI Vault OS</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    body { background: #0a0a12; margin: 0; }
  </style>
</head>
<body>
  <script type="module">
    import { openDB }                from "./vault.js";
    import { saveRecord, getRecord } from "./db.js";
    import { _createGuestSession }   from "./authSession.js";

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }

    // Init vault silently, then go straight to dashboard
    async function boot() {
      try {
        await openDB();
        const existing = await getRecord("settings", "system");
        if (!existing) {
          await saveRecord("settings", { id: "system", theme: "dark", aiEnabled: false, activeRun: 0 });
        }
      } catch { /* non-fatal — dashboard handles errors */ }

      try { _createGuestSession(); } catch {}

      window.location.replace("dashboard.html");
    }

    boot();
  </script>
</body>
</html>
