<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>AI Vault OS</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }
    h1 { font-size: 1.8rem; letter-spacing: 0.05em; color: #a78bfa; }
    p { color: #888; font-size: 0.95rem; }
    .status-badge {
      background: #1a1a2e;
      border: 1px solid #a78bfa44;
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      color: #a78bfa;
    }
    button {
      background: #a78bfa;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #c4b5fd; }
  </style>
</head>
<body>
  <h1>⚡ AI Vault OS</h1>
  <div class="status-badge" id="run-badge">RUN 0 — INITIALIZED</div>
  <p id="status-msg">System initializing SSOT core...</p>
  <button onclick="goSettings()">⚙️ Settings</button>

  <script src="app.js" type="module"></script>
</body>
</html>
